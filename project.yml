name: HostMail
options:
  bundleIdPrefix: com.host.mail
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  groupSortPosition: top

packages:
  HostMailCore:
    path: HostMailCore

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  HostMail-iOS:
    type: application
    platform: iOS
    sources:
      - path: HostMail-iOS/Sources
      - path: HostMail-iOS/Resources
    dependencies:
      - package: HostMailCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.host.mail.ios
        PRODUCT_NAME: HostMail
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: HostMail
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  HostMail-macOS:
    type: application
    platform: macOS
    sources:
      - path: HostMail-macOS/Sources
      - path: HostMail-macOS/Resources
    dependencies:
      - package: HostMailCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.host.mail.macos
        PRODUCT_NAME: HostMail
        INFOPLIST_KEY_CFBundleDisplayName: HostMail
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Host*"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_HARDENED_RUNTIME: YES
